<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Global Tech Connect - Event Registration</title>

   
    <link rel="stylesheet" href="midlabexam.css">

    
    <script src="midlabexam.js" defer></script>
</head>

<body>

<div class="container">

    <h1>Global Tech Connect</h1>
    <h2>Event Registration</h2>

    <form id="registrationForm">

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name">
            <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
            <label for="email">Professional Email</label>
            <input type="email" id="email">
            <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
            <label for="company">Company / Institution (Optional)</label>
            <input type="text" id="company">
        </div>

        <div class="form-group">
            <label>Attendance Type</label>

            <div class="radio-group">
                <label>
                    <input type="radio" name="attendance" value="Virtual">
                    Virtual
                </label>

                <label>
                    <input type="radio" name="attendance" value="In-Person">
                    In-Person
                </label>
            </div>

            <small class="error" id="attendanceError"></small>
        </div>

        <button type="submit">Register</button>

    </form>


    <button id="toggleAnalytics">Show Event Analytics</button>

    <div id="analyticsPanel" class="hidden">

        <h3>Event Statistics</h3>

        <p>Total Registrants: <span id="total">0</span></p>
        <p>Virtual Attendees: <span id="virtualCount">0</span></p>
        <p>In-Person Attendees: <span id="inpersonCount">0</span></p>

    </div>

</div>

</body>
</html>
